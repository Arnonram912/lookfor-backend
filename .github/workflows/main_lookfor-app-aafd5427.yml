# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - lookfor-app-aafd5427

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: lookforacraafd5427.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_84EFB16D68194B99901F80CC5A9B9E00 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_9198109DBA9E49A98035A14FF79FBC21 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: lookforacraafd5427.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_84EFB16D68194B99901F80CC5A9B9E00 }}/lookfor-backend:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_90F8FC64568A4CF1B05596B7306AC1F6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3C5490667DFB452A9FD1495B6CA51E83 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1DBCFB57F2854900A88DD531EE5A394D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'lookfor-app-aafd5427'
          slot-name: 'Production'
          images: 'lookforacraafd5427.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_84EFB16D68194B99901F80CC5A9B9E00 }}/lookfor-backend:${{ github.sha }}'
          